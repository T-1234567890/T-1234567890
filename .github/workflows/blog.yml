name: Blog Generator

on:
  push:
    paths:
      - "website/blog/posts/**"
      - "website/scripts/generate-blog.mjs"
      - "website/blog/blog.js"
      - "website/blog/post.js"
      - "website/blog/index.html"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-generator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate manifest + post pages
        run: node website/scripts/generate-blog.mjs

      - name: Commit and push changes
        run: |
          shopt -s nullglob
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add website/blog/manifest.json website/blog/*/index.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(blog): update manifest and post pages"
          git push
