<!doctype html>
<html lang="en" data-lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Tony — Developer Landing</title>
    <meta
      name="description"
      content="A calm, minimal developer landing page with subtle motion."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <header class="topbar">
      <nav class="nav" aria-label="Primary">
        <a class="nav__logo" href="/" aria-label="Home">
          <img src="assets/logo.svg" alt="" width="28" height="28" />
        </a>

        <div class="nav__center">
          <a class="nav__link" href="/about/" data-i18n="nav_about">About</a>
          <a
            class="nav__link"
            href="/blog/"
            data-i18n="nav_blog"
          >
            Blog
          </a>
          <a
            class="nav__link"
            href="/projects/"
            data-i18n="nav_projects"
          >
            Projects
          </a>
        </div>

        <button class="nav__lang" type="button" aria-pressed="false">
          中文
        </button>
      </nav>
    </header>

    <main class="page">
      <section class="hero state-name" id="heroRoot" aria-label="Hero">
        <div class="hero__universe">
          <div class="hero__stage">

              </span>

              <!-- Small (social) -->
              <span class="logo" style="--x:760;--y:-60;--dx:-4;--dy:4;--d:54s;--delay:-17.4s;--op:0.10;--s:34">

              </span>
            </div>

            <div class="center-stack" id="center-stack">
              <div class="hero-state hero-state--intro" id="hero-intro">
                <h1 class="hero__title nameLine" id="heroNameLine">
                  <span class="heroPrefix" data-i18n="hero_hi">Hi, I’m</span>
                  <span class="type-reserve hero-name-slot" aria-label="Name">
                    <span class="type-text" id="typedName"></span>
                    <span class="cursor" aria-hidden="true">|</span>
                  </span>
                </h1>
              </div>

              <div
                class="hero-state hero-state--terminal"
                id="hero-terminal"
                aria-hidden="true"
              >
                <div class="terminal-embed" id="heroTerminalCard" aria-hidden="true">
                  <p align="center">
                    <img
                      src="https://readme-typing-svg.demolab.com?font=JetBrains+Mono&size=25&duration=4200&pause=40&color=7F7F7F&center=true&vCenter=true&width=900&lines=Hello+World;%24+ls;%24+pwd;%24+cd+projects;%24+git+status;%24+git+pull;%24+npm+run+dev;python+main.py;main.rs;index.html;AppDelegate.swift;GoogleService-Info.plist;%24+code+.;README.md;%24+whoami;%24+rm+-rf;%24+_&repeat=true"
                    />
                  </p>
                </div>
              </div>
            </div>
          </div>

          <div class="hero-scroll-space" aria-hidden="true"></div>

          <div class="hero-trigger" id="heroSentinel" aria-hidden="true"></div>
          <div class="nav-trigger" id="nav-trigger" aria-hidden="true"></div>
        </div>
      </section>

      <section class="section" id="links" aria-label="Links">
        <div class="section__inner section__inner--wide">
          <nav class="links-card links-card--nav reveal" aria-label="Quick navigation">
            <div class="links-grid nav-panel__grid" role="list" aria-label="Navigation links">
              <a class="linkBtn nav-panel__btn" role="listitem" href="/about/">
                <span class="linkBtn__label" data-i18n="nav_about">About</span>
              </a>
              <a class="linkBtn nav-panel__btn" role="listitem" href="/blog/">
                <span class="linkBtn__label" data-i18n="nav_blog">Blog</span>
              </a>
              <a class="linkBtn nav-panel__btn" role="listitem" href="/projects/">
                <span class="linkBtn__label" data-i18n="nav_projects">Projects</span>
              </a>
            </div>
          </nav>

          <div class="links-card reveal" id="linksCard">
            <div class="links-card__head">
              <h2 class="section__title links-card__title" data-i18n="links_title">
                Links
              </h2>
              <p class="links-card__sub" data-i18n="links_sub">
                Find me around the internet.
              </p>
            </div>

            <div class="links-grid" role="list" aria-label="Social links">
              <a
                class="linkBtn"
                role="listitem"
                href="https://github.com/T-1234567890"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHub"
              >
                  <img
                    class="linkBtn__icon logo__img"
                    src="https://cdn.simpleicons.org/github/0B0F14"
                    data-fallback="assets/icons/github.svg"
                    alt=""
                  />
                <span class="linkBtn__label">GitHub</span>
              </a>

              <a
                class="linkBtn"
                role="listitem"
                href="https://x.com/TonyHu12345"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="X"
              >
                  <img
                    class="linkBtn__icon logo__img"
                    src="https://cdn.simpleicons.org/x/0B0F14"
                    data-fallback="assets/icons/x.svg"
                    alt=""
                  />
                <span class="linkBtn__label">X</span>
              </a>

              <a
                class="linkBtn"
                role="listitem"
                href="https://500px.com.cn/community/user-details/4b1bb63c840e19472cea2526eecba9209"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="500px"
              >
                  <img
                    class="linkBtn__icon logo__img"
                    src="https://cdn.simpleicons.org/500px/0B0F14"
                    data-fallback="assets/icons/500px.svg"
                    alt=""
                  />
                <span class="linkBtn__label">500px</span>
              </a>

              <a
                class="linkBtn"
                role="listitem"
                href="https://steamcommunity.com/profiles/76561199725300446/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Steam"
              >
                  <img
                    class="linkBtn__icon logo__img"
                    src="https://cdn.simpleicons.org/steam/0B0F14"
                    data-fallback="assets/icons/steam.svg"
                    alt=""
                  />
                <span class="linkBtn__label">Steam</span>
              </a>

              <button
                class="linkBtn linkBtn--button"
                role="listitem"
                type="button"
                id="discordCopy"
                aria-label="Discord (copy ID)"
              >
                  <img
                    class="linkBtn__icon logo__img"
                    src="https://cdn.simpleicons.org/discord/0B0F14"
                    data-fallback="assets/icons/discord.svg"
                    alt=""
                  />
                <span class="linkBtn__label">Discord</span>
                <span class="linkBtn__tip" id="discordTip" aria-live="polite"
                  >Copied</span
                >
              </button>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer reveal" id="siteFooter">
        <div class="footer__inner footer__inner--simple">
          <div class="footer__line" data-i18n="footer_line1">
            © 2026 Tony. All rights reserved.
          </div>
          <div class="footer__tiny" data-i18n="footer_line2">
            This website uses cookies for basic functionality and analytics.
          </div>
          <div class="footer__line">
            <a class="footer__link" href="/privacy/" data-i18n="footer_privacy">Privacy Policy</a>
          </div>
        </div>
      </footer>
    </main>

    <!-- Privacy Policy lives at /privacy/ -->

    <script src="https://unpkg.com/typewriter-effect@2.18.2/dist/core.js"></script>

</html>
